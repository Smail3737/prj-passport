services:
  - type: web
    name: project-passport-react
    runtime: node
    region: frankfurt
    buildCommand: npm install && npm run prisma:generate --workspace backend && npm run prisma:migrate:deploy --workspace backend && npm run frontend:build
    preDeployCommand: npm run prisma:migrate:deploy --workspace backend
    startCommand: npm run web:serve
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: project-passport-db
          property: connectionString
      - key: REMOTE_AI_BASE_URL
        value: "https://text.pollinations.ai"
      - key: AI_REQUEST_TIMEOUT_MS
        value: "60000"

databases:
  - name: project-passport-db
    databaseName: project_passport
    user: project_passport_user
